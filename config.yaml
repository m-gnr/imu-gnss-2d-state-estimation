simulation:
  total_time: 1000.0
  main_frequency: 50.0
  dt: 0.02
  random_seed: 42

coordinate_system:
  x_axis: "east"
  y_axis: "north"
  yaw_unit: "degree"
  initial_yaw_reference: "90 deg means positive y direction"
  positive_rotation: "counter_clockwise"
  right_turn_sign: -1

vehicle:
  initial_x: 0.0
  initial_y: 0.0
  initial_speed_kmh: 0.0
  initial_yaw_deg: 90.0
  turn_direction_sign: -1

route:
  - start: 0
    end: 10
    speed_start_kmh: 0
    speed_end_kmh: 100
    yaw_change_deg: 0

  - start: 10
    end: 20
    speed_start_kmh: 100
    speed_end_kmh: 100
    yaw_change_deg: 45

  - start: 20
    end: 200
    speed_start_kmh: 100
    speed_end_kmh: 100
    yaw_change_deg: 0

  - start: 200
    end: 230
    speed_start_kmh: 100
    speed_end_kmh: 150
    yaw_change_deg: 0

  - start: 230
    end: 260
    speed_start_kmh: 150
    speed_end_kmh: 100
    yaw_change_deg: 180

  - start: 260
    end: 500
    speed_start_kmh: 100
    speed_end_kmh: 100
    yaw_change_deg: 0

  - start: 500
    end: 510
    speed_start_kmh: 100
    speed_end_kmh: 50
    yaw_change_deg: 0

  - start: 510
    end: 800
    speed_start_kmh: 50
    speed_end_kmh: 50
    yaw_change_deg: 0

  - start: 800
    end: 830
    speed_start_kmh: 50
    speed_end_kmh: 100
    yaw_change_deg: 90

  - start: 830
    end: 990
    speed_start_kmh: 100
    speed_end_kmh: 100
    yaw_change_deg: 0

  - start: 990
    end: 1000
    speed_start_kmh: 100
    speed_end_kmh: 0
    yaw_change_deg: 0

imu:
  frequency: 50.0
  accel_noise_std: 0.10
  gyro_noise_std: 0.005
  accel_bias:
    ax: 0.05
    ay: -0.03
  gyro_bias: 0.002
  accel_scale:
    ax: 1.02
    ay: 0.98
  gyro_scale: 1.01

gnss:
  frequency: 5.0
  delay_sec: 0.2
  position_noise_std: 2.0
  velocity_noise_std: 0.5

faults:
  dropout:
    enabled: true
    start: 300
    end: 310

  position_jump:
    enabled: true
    start: 400
    end: 401
    error_x: 500
    error_y: 500

  freeze:
    enabled: true
    start: 500
    end: 505

calibration:
  # Vehicle is moving at constant speed on a straight segment in this window
  # (true accel ~ 0, true yaw-rate ~ 0), so the IMU bias can be estimated
  # directly from data without using any ground-truth values.
  bias_window_start: 50.0
  bias_window_end: 150.0
  # Scale factors are assumed known from the sensor datasheet / factory
  # calibration and are taken from the imu section above.

filters:
  low_pass:
    alpha: 0.05

  complementary:
    alpha: 0.98

  ekf:
    # Process noise (how much we trust the IMU propagation)
    process_noise_pos: 0.05
    process_noise_vel: 0.05
    process_noise_yaw: 0.01
    # Initial covariance
    init_pos_var: 25.0
    init_vel_var: 4.0
    init_yaw_var: 0.5
    # Innovation (chi-square) gating: GNSS measurements whose normalised
    # squared residual exceeds this threshold are rejected as outliers.
    # ~chi2(4 dof) 99.9% = 18.5; here a tighter gate is used to reject the
    # position-jump fault while accepting normal noisy measurements.
    gate_threshold: 16.0
    # Measurement noise is taken from the gnss section (position/velocity std)

output:
  plot_dir: outputs/plots
  data_dir: outputs/data
  save_csv: true
  timeseries_file: outputs/data/timeseries.npz

gui:
  window:
    width: 1180
    height: 760
    fps: 60
    title: "IMU-GNSS Minimap"
  data_source: outputs/data/timeseries.npz
  map:
    orientation: heading_up      # heading_up | north_up
    zoom_m: 250                  # meters shown across half the minimap width
    trail_seconds: 25            # length of the trail behind the vehicle
    default_method: EKF          # filter trail shown on the map at start
  playback:
    speed_levels: [0.5, 1, 2, 4, 8, 16]
    initial_speed: 1
    start_paused: false
  charts:
    height: 150                  # bottom strip band height (px)
    compare_all_methods: false   # false: only the active method (follows M key)
    signals: [position_error, speed_error, yaw_error]
    speed_unit: kmh              # kmh | ms
  layers:
    ground_truth: true
    gnss_points: true
    estimate: true
  colors:
    background: [18, 25, 37]
    panel: [12, 18, 27]
    grid: [91, 107, 130]
    ground_truth: [93, 220, 138]
    estimate: [242, 197, 55]
    gnss_valid: [90, 160, 239]
    gnss_invalid: [226, 85, 85]
    vehicle: [255, 255, 255]
    text: [233, 238, 246]
    text_dim: [124, 138, 163]
    warning: [226, 85, 85]
    # per-method identity colors (map trail + strips recolor with the M key)
    method_cycle:
      - [240, 150, 70]    # Raw GNSS    - orange
      - [170, 120, 235]   # Low-pass    - purple
      - [80, 200, 210]    # Complementary - cyan
      - [242, 197, 55]    # EKF         - yellow

plotting:
  dpi: 150
  show_plots: false